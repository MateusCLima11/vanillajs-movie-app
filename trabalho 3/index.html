<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineApp - Filmes e Séries</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>🎬 CineApp</h1>
        <div>
            <button id="nav-home" class="btn-nav">Início</button>
            <button id="nav-favoritos" class="btn-nav">⭐ Favoritos</button>
        </div>
    </header>

    <main class="content-container">
        <form id="form-busca" class="search-form">
            <input type="text" id="input-busca" placeholder="Pesquisar filmes ou séries..." autocomplete="off">
            <select id="tipo-busca">
                <option value="movie">Filmes</option>
                <option value="tv">Séries</option>
            </select>
            <select id="filtro-genero">
                <option value="">Todos os Géneros</option>
            </select>
            <button type="submit">Pesquisar</button>
        </form>

        <h2 id="titulo-secao">Destaques do Momento</h2>
        
        <div id="grid-filmes" class="movie-grid"></div>
    </main>

    <div id="modal-detalhes" class="modal">
        <div class="modal-content">
            <span id="fechar-modal" class="close-modal">&times;</span>
            <div id="modal-corpo"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
